query GetDepotStorageLayout($depotId: UUID!) {
  depotStorageLayout(depotId: $depotId) {
    depotId
    depotName
    availableDeliveryZones {
      id
      name
    }
    storageZones {
      id
      name
      depotId
      storageAisles {
        id
        name
        storageZoneId
        binLocations {
          id
          name
          isActive
          storageAisleId
          deliveryZoneId
          deliveryZoneName
        }
      }
    }
  }
}

mutation CreateStorageZone($input: CreateStorageZoneInput!) {
  createStorageZone(input: $input) {
    id
    name
    depotId
    storageAisles {
      id
      name
      storageZoneId
      binLocations {
        id
        name
        isActive
        storageAisleId
        deliveryZoneId
        deliveryZoneName
      }
    }
  }
}

mutation UpdateStorageZone($id: UUID!, $input: UpdateStorageZoneInput!) {
  updateStorageZone(id: $id, input: $input) {
    id
    name
    depotId
    storageAisles {
      id
      name
      storageZoneId
      binLocations {
        id
        name
        isActive
        storageAisleId
        deliveryZoneId
        deliveryZoneName
      }
    }
  }
}

mutation DeleteStorageZone($id: UUID!) {
  deleteStorageZone(id: $id)
}

