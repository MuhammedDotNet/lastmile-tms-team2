services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    env_file:
      - ./src/backend/src/LastMile.TMS.Api/.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started

  api:
    build:
      context: src/backend
      dockerfile: Dockerfile
    image: lastmile-tms-api:latest
    ports:
      - "8080:8080"
    env_file:
      - ./src/backend/src/LastMile.TMS.Api/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=lastmile_tms;Username=postgres;Password=postgres
      ConnectionStrings__HangfireConnection: Host=postgres;Port=5432;Database=lastmile_tms;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      Authentication__Issuer: http://localhost
      Storage__Endpoint: http://minio:9000
      Storage__AccessKey: minioadmin
      Storage__SecretKey: minioadmin
      Storage__Region: us-east-1
      Storage__BucketName: lastmile-binaries
      Storage__ForcePathStyle: "true"
      Storage__AutoCreateBucket: "true"
      Serilog__Using__1: Serilog.Sinks.Seq
      Serilog__WriteTo__1__Name: Seq
      Serilog__WriteTo__1__Args__serverUrl: http://seq:80
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: src/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost
        NEXT_PUBLIC_AUTH_URL: http://localhost
    image: lastmile-tms-web:latest
    environment:
      API_URL: http://api:8080
      AUTH_SECRET: lastmile-tms-dev-secret-change-in-production
      AUTH_TRUST_HOST: true
      NEXTAUTH_URL: http://localhost

  postgres:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lastmile_tms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/lastmile_tms
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    depends_on:
      postgres:
        condition: service_healthy

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    volumes:
      - seqdata:/data

volumes:
  pgdata:
  miniodata:
  redisdata:
  seqdata:
